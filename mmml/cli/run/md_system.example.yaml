# Single-run example (flat keys):
#   mmml md-system --config mmml/cli/run/md_system.example.yaml
#
# Campaign example (defaults + runs):
#   mmml md-system --config mmml/cli/run/md_system.example.yaml --run-all
#   mmml md-system --config mmml/cli/run/md_system.example.yaml --job-id jaxmd_prod

# --- Uncomment for a single JAX-MD NPT run ---------------------------------
# setup: pbc_npt
# backend: jaxmd
# composition: "DCM:20"
# checkpoint: /path/to/DESdimers_params.json
# output_dir: results/jaxmd_single
# box_size: 38.0
# packmol_placement: cube  # default; use sphere + packmol_radius for legacy sphere packing
# dt_fs: 0.25
# temperature: 260.0
# pressure: 10.0
# ps: 20
# seed: 123

# --- Campaign: PyCHARMM equil → JAX-MD prod → PyCHARMM prod ---------------
# box_size: Packmol inside-cube edge length (Å) and PBC cell side
# packmol_radius: optional legacy fallback (cube side = 2× radius when box_size unset)
defaults:
  composition: "DCM:20"
  checkpoint: /mmhome/boittier/home/mmml/examples/ckpts_json/DESdimers_params.json
  box_size: 38.0
  dt_fs: 0.25
  temperature: 160.0
  seed: 123
  spacing: 5.0
  mm_switch_on: 9.0
  mm_switch_width: 1.5
  ml_switch_width: 1.0
  # PyCHARMM/MLpot CPU experiment knob: default is 1 for MPI-linked safety.
  # charmm_omp_threads: 4

campaign_output: artifacts/dcm20_pipeline

runs:
  pycharmm_equil:
    description: "Minimize, heat, and NPT equilibrate at 260 K / 10 atm"
    backend: pycharmm
    setup: pbc_npt
    md_stages: "mini,heat,equi"
    ps_heat: 0.1
    ps_equi: 0.1
    pressure: 1.0
    output_dir: results/pycharmm_equil

  jaxmd_prod:
    description: "NVT production with JAX-MD after PyCHARMM equilibration"
    backend: jaxmd
    setup: pbc_nvt
    depends_on: pycharmm_equil
    ps: 20
    pressure: 1.0
    output_dir: results/jaxmd_prod
    handoff_write_res: true
    # Optional: auto pre-min when MMML |F| > 1 eV/Å at handoff (see docs/handoff.md)
    # handoff_quality_gate: true
    # handoff_quality_fmax_eVA: 1.0
    # jaxmd_minimize_steps: 500
    extra_args:
      - "--steps-per-recording"
      - "800"
      - "--jax-md-update-interval"
      - "1"

  jaxmd_nve:
    description: "Short NVE replicates from NPT prod (seed offset per rep)"
    backend: jaxmd
    setup: pbc_nve
    ps: 1
    repeat: 4
    depends_on: jaxmd_prod
    # Each replicate writes to results/jaxmd_nve/rep00 … rep03 (see md_campaign._resolve_output_dir).
    output_dir: results/jaxmd_nve

  pycharmm_prod:
    description: "Production leg in PyCHARMM using handoff .res from JAX-MD"
    backend: pycharmm
    setup: pbc_npt
    depends_on: jaxmd_prod
    md_stages: "prod"
    ps: 1
    pressure: 1.0
    output_dir: results/pycharmm_prod
