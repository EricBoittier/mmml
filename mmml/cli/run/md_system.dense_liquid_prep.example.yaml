# Dense liquid box preparation with resilient density prep.
#
# Single run (PyCHARMM equil only):
#   mmml md-system --config mmml/cli/run/md_system.dense_liquid_prep.example.yaml
#
# Full campaign (PyCHARMM equil → JAX-MD prod):
#   mmml md-system --config mmml/cli/run/md_system.dense_liquid_prep.example.yaml --run-all
#
# Composable presets (recommended for DCM:103/:206 from liquid-box):
#   mmml/cli/run/presets/README.md
#   mmml md-system --config mmml/cli/run/md_system.dcm103_equil.example.yaml
#
# See docs/md-system-configs.md § "Resilient density prep" for snippet variants.

include:
  - presets/base-dt0.25.yaml
  - presets/liquid-prep-dense.yaml
  - presets/pre-sd-calculator.yaml
  - presets/heat-dt0.25-conservative.yaml
  - presets/dynamics-overlap-rescue.yaml

defaults:
  checkpoint: /path/to/DESdimers_params.json
  seed: 123
  temperature: 300.0
  pressure: 1.0
  packmol_tolerance: 1.5
  charmm_mm_pretreat: true
  charmm_mm_pretreat_dt_fs: 1.0
  # PBC DCM:206 (1030 ML atoms @ L≈35 Å) needs xlarge tier (max_Npr=12M):
  #   ./scripts/ensure_charmm_mlpot_limits.sh --n-ml 1030 --pbc --box-size 35
  #   export CHARMM_LIB_DIR=~/.cache/mmml-charmm-build/tier_12000000_nodomdec/lib

campaign_output: artifacts/dcm_dense_liquid_prep

runs:
  pycharmm_equil:
    description: "Resilient density prep + mini/heat/equi (DCM @ 75%→100% bulk ρ)"
    backend: pycharmm
    setup: pbc_npt
    composition: "DCM:206"
    md_stages: "mini,heat,equi"
    ps_heat: 5.0
    ps_equi: 10.0
    n_heat_segments: 3
    output_dir: results/dcm_dense/pycharmm_equil

  jaxmd_prod:
    description: "JAX-MD NVT after PyCHARMM handoff (PBC FIRE + optional NPT prelude)"
    backend: jaxmd
    setup: pbc_nvt
    depends_on: pycharmm_equil
    ps: 50
    output_dir: results/dcm_dense/jaxmd_prod
    handoff_write_res: true
    handoff_quality_gate: true
    handoff_quality_fmax_eVA: 1.0
    jaxmd_minimize_steps: 500
    jaxmd_pbc_minimize_steps: 500
    jaxmd_mini_box_equil_ps: 2.0
    extra_args:
      - "--steps-per-recording"
      - "800"
      - "--jax-md-update-interval"
      - "1"
      - "--max-pairs"
      - "500000"
