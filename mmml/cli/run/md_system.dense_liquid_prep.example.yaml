# Dense liquid box preparation with resilient density prep.
#
# Single run (PyCHARMM equil only):
#   mmml md-system --config mmml/cli/run/md_system.dense_liquid_prep.example.yaml
#
# Full campaign (PyCHARMM equil → JAX-MD prod):
#   mmml md-system --config mmml/cli/run/md_system.dense_liquid_prep.example.yaml --run-all
#   mmml md-system --config mmml/cli/run/md_system.dense_liquid_prep.example.yaml --job-id jaxmd_prod
#
# See docs/md-system-configs.md § "Resilient density prep" for snippet variants.

defaults:
  checkpoint: /path/to/DESdimers_params.json
  seed: 123
  dt_fs: 0.25
  temperature: 300.0
  pressure: 1.0
  spacing: 4.0
  packmol_tolerance: 1.5
  mm_switch_on: 6.0
  mm_switch_width: 4.0
  ml_switch_width: 1.0

  # --- Density / box sizing ---
  box_auto: density
  bulk_density_fraction: 0.75
  target_density_g_cm3: 1.326
  mc_density_equalize: true
  mc_density_steps: 80
  mc_density_min_scale: 0.35
  mc_density_max_scale: 1.5

  # --- Resilient prep (preventive + post-mini ladder) ---
  density_prep_mode: resilient
  density_prep_ladder_max_rounds: 3
  density_prep_lattice_abnr_steps: 200
  mini_lattice_abnr_steps: 200
  mini_lattice_abnr_allow_fixed_box: true
  mini_box_equil_ps: 2.0
  mini_box_equil_allow_fixed_box: true

  # --- CHARMM / MLpot minimization ---
  charmm_pre_minimize: true
  charmm_sd_steps: 1000
  charmm_abnr_steps: 1000
  mini_nstep: 500
  bonded_mm_mini: true
  bonded_mm_mini_after: mini,heat
  bonded_mm_mini_steps: 500
  calculator_pre_minimize: true
  pre_min_steps: 200
  pre_min_fmax: 0.05
  max_grms_before_dyn: 50.0

  # --- Dynamics overlap rescue (dense boxes) ---
  dynamics_overlap_action: rescue
  dynamics_overlap_min_distance: 1.5
  dynamics_intra_min_distance: 0.5
  dynamics_overlap_check_interval: 250
  no_echeck_heat: true
  heat_thermostat: hoover

campaign_output: artifacts/dcm_dense_liquid_prep

runs:
  pycharmm_equil:
    description: "Resilient density prep + mini/heat/equi (DCM @ 75%→100% bulk ρ)"
    backend: pycharmm
    setup: pbc_npt
    composition: "DCM:206"
    md_stages: "mini,heat,equi"
    ps_heat: 5.0
    ps_equi: 10.0
    n_heat_segments: 3
    output_dir: results/dcm_dense/pycharmm_equil

  jaxmd_prod:
    description: "JAX-MD NVT after PyCHARMM handoff (PBC FIRE + optional NPT prelude)"
    backend: jaxmd
    setup: pbc_nvt
    depends_on: pycharmm_equil
    ps: 50
    output_dir: results/dcm_dense/jaxmd_prod
    handoff_write_res: true
    handoff_quality_gate: true
    handoff_quality_fmax_eVA: 1.0
    jaxmd_minimize_steps: 500
    jaxmd_pbc_minimize_steps: 500
    jaxmd_mini_box_equil_ps: 2.0
    extra_args:
      - "--steps-per-recording"
      - "800"
      - "--jax-md-update-interval"
      - "1"
      - "--max-pairs"
      - "500000"
