# DCM:52 equilibration — same preset stack, smaller cluster.
#
#   mmml md-system --config mmml/cli/run/md_system.dcm52_equil.example.yaml \
#     --job-id dcm52_equil

include:
  - presets/base-dt0.25.yaml
  - presets/certified-box-handoff.yaml
  - presets/liquid-prep-dense.yaml
  - presets/pre-sd-calculator.yaml
  - presets/heat-dt0.25-conservative.yaml
  - presets/dynamics-overlap-rescue.yaml
  - presets/dynamics-flyoff-guard.yaml

defaults:
  checkpoint: /path/to/DESdimers_params.json
  seed: 123
  composition: "DCM:52"
  from_psf: boxes/dcm52/model.psf
  from_crd: boxes/dcm52/model.crd
  box_size: null
  setup: pbc_npt
  backend: pycharmm
  md_stages: "mini,heat,equi"
  ps_heat: 10.0
  ps_equi: 10.0
  output_dir: runs/dcm52_equil

campaign_output: artifacts/md_system/dcm52_equil

runs:
  dcm52_equil:
    description: "DCM:52 mini → conservative heat → NPT equi"
    backend: pycharmm
    setup: pbc_npt
    md_stages: "mini,heat,equi"
    composition: "DCM:52"
    ps_heat: 10.0
    ps_equi: 10.0
    output_dir: runs/dcm52_equil
