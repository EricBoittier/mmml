name: dimer_smoke
title: DCM dimer smoke — structures → QM → train → MD → IR
description: >
  Minimal end-to-end recipe for MCP testing. Smoke mode skips QM/training and uses
  the bundled DESdimers checkpoint; full mode runs the qm-physnet-pipeline preset.

modes:
  smoke:
    skip_stages: [structures, qm, train]
    checkpoint: examples/ckpts_json/DESdimers_params.json
    md_ps: 20.0
    dt_fs: 0.1
    steps_per_recording: 1
    composition: "DCM:2"
    ir_methods: [classical_cgenff, harmonic_pointcharge]
    dipole_training_npz: dcm_mp2_psf_order.npz
  dipole_smoke:
    skip_stages: [structures, qm, train]
    checkpoint: examples/ckpts_json/DESdimers_params.json
    md_ps: 2.0
    dt_fs: 0.5
    steps_per_recording: 50
    composition: "DCM:2"
    ir_methods: [classical_cgenff, harmonic_pointcharge, ml_dipole]
    dipole_training_npz: dcm_mp2_psf_order.npz
    dipole_training_subset: 800
    dipole_checkpoint: ckpts/dcm_dipole_smoke
  full:
    skip_stages: []
    preset: qm-physnet-pipeline
    md_ps: 2.0
    composition: "DCM:20"

stages:
  configure:
    description: Create run directory and QM/train YAML templates
    preset: qm-physnet-pipeline

  structures:
    description: Generate or sample dimer conformers (normal-mode-sample / interpolate-xyz)
    commands:
      - normal-mode-sample
    outputs:
      - structures/sampled.npz

  qm:
    description: GPU DFT labeling (pyscf-evaluate batch)
    commands:
      - pyscf-evaluate
    inputs:
      - structures/sampled.npz
    outputs:
      - data/raw_evaluated.npz

  train:
    description: fix-and-split then physnet-train
    commands:
      - fix-and-split
      - physnet-train
    outputs:
      - ckpts/

  md:
    description: Short ASE/JAX-MD production for IR (md-system)
    commands:
      - md-system
    outputs:
      - md/traj
      - md/campaign.yaml

  ir:
    description: >
      Classical CGENFF autocorrelation IR, harmonic point-charge sticks (NIST overlay),
      and optional ML-dipole IR when a charges=True PhysNet checkpoint is available.
    methods: [classical_cgenff, harmonic_pointcharge, ml_dipole]
    outputs:
      - spectra/ir.png
      - spectra/harmonic_ir.png
      - spectra/ir_ml_dipole.png

  train_dipole:
    description: >
      Mini fix-and-split + physnet-train --charges on dcm_mp2_psf_order.npz, then physnet-evaluate.
    commands:
      - fix-and-split
      - physnet-train
      - physnet-evaluate
    outputs:
      - splits/
      - ckpts/dcm_dipole_smoke/
      - eval/dipole_smoke/
