site_name: MMML Documentation
site_description: Molecular Mechanics and Machine-Learned Force-Field Toolkit
site_url: https://mmml.readthedocs.io/
repo_url: https://github.com/EricBoittier/mmml
repo_name: EricBoittier/mmml

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            show_submodules: false
            members_order: source

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Package Architecture: package-architecture.md
  - DCMNet Calculators: dcmnet_calculators.md
  - md-system YAML configs: md-system-configs.md
  - MLpot Settings: mlpot-settings.md
  - Medium PBC (500–2000 monomers): mlpot-medium-pbc.md
  - Long-range electrostatics (ScaFaCoS): mlpot-long-range-electrostatics.md
  - Cross-backend MD handoff: handoff.md
  - QC supplementary cross-check: qc-cross-check.md
  - Spatial ML MPI: mlpot-spatial-mpi.md
  - PyCHARMM Threading: pycharmm-threading.md
  - Development: development.md
  - Units Summary: UNITS_SUMMARY.md
  - API Reference: api.md
