site_name: MMML Documentation
site_description: Molecular Mechanics and Machine-Learned Force-Field Toolkit
site_url: https://mmml.readthedocs.io/
repo_url: https://github.com/EricBoittier/mmml
repo_name: EricBoittier/mmml

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            show_submodules: false
            members_order: source

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI:
      - Overview: cli/index.md
      - Tab completion: cli/completion.md
      # CLI_NAV_START
