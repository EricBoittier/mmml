# DCM / ACO PBC burst campaign: gentle PyCHARMM heat + alternating JAX-MD / equil.
#
# Output layout (gitignored under repo root or absolute output_root):
#   artifacts/pbc_solvent_burst/{solvent}_{n}_t{T}_l{L}/
#     campaign.yaml
#     pycharmm_init/pretreat/ …
#     jaxmd_burst_01/ …
#
# Matrix: solvents × cluster_sizes × temperatures × box_sizes
# Override matrix root: output_root: /path/to/runs/pbc_solvent_burst

solvents: [DCM, ACO]
cluster_sizes: [10, 30, 50, 80, 100]
temperatures: [100.0, 200.0, 300.0]
box_sizes: [28.0, 32.0, 36.0]
checkpoint: /mmhome/boittier/home/mmml/examples/ckpts_json/DESdimers_params.json
output_root: artifacts/pbc_solvent_burst
seed_base: 123456

# Burst timing (per matrix cell)
jaxmd_burst_ps: 200.0
jaxmd_bursts: 5
pycharmm_equi_ps: 5.0
pycharmm_equi_legs: 5

# Gentle MLpot heat (pycharmm_init); heat_finalt follows cell temperature
ps_heat: 10.0
n_heat_segments: 10
heat_firstt: 40.0
# Scale (IHTFRQ) avoids Hoover CPT piston instability on large ML USER-only clusters.
heat_thermostat: scale
dt_fs: 0.25
pressure: 1.0

# Hybrid cleanup ladder (maps to existing mmml recovery hooks).
# Triggers: overlap → MLpot/CHARMM rescue; handoff → JAX PBC FIRE; pretreat → preventive CHARMM MM.
cleanup_strategy:
  name: pbc_hybrid_default
  charmm_mm:
    # CGENFF mini + CHARMM heat/equi/prod before each MLpot PyCHARMM leg
    pretreat_on_pycharmm: true
    ps_heat: 100.0
    ps_equi: 100.0
    ps_prod: 100.0
    overlap_rescue_sd_steps: 200
    overlap_rescue_abnr_steps: 400
  mlpot:
    # ML USER-only heat (no SHAKE) can trip scaled echeck within ~200 steps on N≥80.
    no_echeck_heat: true
    dynamics_overlap_action: rescue
    dynamics_overlap_min_distance: 1.5
    dynamics_intra_min_distance: 0.5
    dynamics_overlap_check_interval: 500
    bonded_mm_mini: true
    bonded_mm_mini_after: mini,heat
    bonded_mm_mini_steps: 100
    charmm_pre_minimize: true
    charmm_sd_steps: 200
    charmm_abnr_steps: 400
    mini_nstep: 150
    dcd_nsavc: 500
    dyn_nprint: 500
  jaxmd_pbc:
    handoff_quality_gate: true
    handoff_quality_fmax_eVA: 1.0
    handoff_quality_action: minimize
    jaxmd_minimize_steps: 200
    jaxmd_pbc_minimize_steps: 200
    dynamics_overlap_action: rescue
    overlap_rescue_sd_steps: 200
    overlap_rescue_abnr_steps: 400
    steps_per_recording: 800
    jax_md_update_interval: 1

# MM / ML cutoffs
mm_switch_on: 6.0
mm_switch_width: 4.0
ml_switch_width: 1.5
spacing: 5.0
packmol_tolerance: 1.0

ml_gpu_count: 1
ml_batch_size: 1024

mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh

# Slurm: tier small N (≤30) → RTX3080 nodes; large N (50–100) → fast pool.
slurm_small_cluster_max_n: 30
slurm_max_concurrent_fast: 14
slurm_max_concurrent_slow: 20
slurm_partition: gpu
slurm_nodes: 1
slurm_ntasks: 1
slurm_cpus_per_task: 4
slurm_mem_mb_per_cpu: 3000
slurm_runtime_min: 2880
slurm_mail_user: ericdavid.boittier@unibas.ch
slurm_gpu_nodes_fast:
  - gpu08   # RTX5090 ×2
  - gpu09
  - gpu10
  - gpu11
  - gpu06   # RTX4090 ×1
  - gpu26
  - gpu04   # RTX3090 ×2
  - gpu25   # RTX3090 Ti ×2
slurm_gpu_nodes_slow:
  - gpu01   # RTX3080 ×2, smoke / N≤30
  - gpu02
  - gpu03
  - gpu12
  - gpu13
  - gpu18
  - gpu20
  - gpu21
  - gpu22
  - gpu23

optional_sizes: [100]

# Skip known-hard cells without editing cluster_sizes / box_sizes (Snakemake rule all
# ignores excluded tags). Uncomment while debugging overlap / pretreat on large N.
