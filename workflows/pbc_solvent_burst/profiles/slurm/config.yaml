# Snakemake >=8.6: requires snakemake-executor-plugin-slurm (see README).
# jobs: max Snakemake jobsteps in flight; match slurm_max_concurrent in config.yaml.
executor: slurm
jobs: 10
latency-wait: 120
retries: 1
envvars:
  - MMML_CKPT
default-resources:
  - gpu=1
  - gpu_fast=0
  - gpu_slow=0
  - charmm_slot=1
  - runtime=2880
  - nodes=1
  - slurm_partition=gpu
  - mem_mb_per_cpu=4000
  - cpus_per_task=4
  - tasks=1
