# DCM:N free-space PyCHARMM MLpot NVE scaling (N = 3, 5..10).
# Checkpoint: export MMML_CKPT before snakemake.
#
# ML dimer slots: --free-space uses all C(N,2) unique pairs (no sparse truncation).
# Do not set MMML_MLPOT_MAX_ACTIVE_DIMERS below C(N,2) for these runs; the post-mini
# audit validates with the same free-space all-pairs policy.

cluster_sizes: [3, 5, 6, 7, 8, 9, 10]
composition_prefix: DCM
atoms_per_monomer: 5
checkpoint: "${MMML_CKPT}"
output_root: results
mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh

# Dynamics (free_nve: mini + nve)
# Short NVE leg for screening; raise ps_nve once COM QC is stable.
ps_nve: 0.2
# Sweep CHARMM inbfrq for NVE (-1 = heuristic; 0 = frozen lists; 50 = legacy default).
nve_inbfrq_values: [-1, 0, 1, 10, 50]
# ENER+UPDATE after mini before NVE (mini uses inbfrq=0; avoids first UPDECI jump).
pre_nve_charmm_update: true
dt_fs: 0.25
# Once per integration step (print + DCD + forces)
dcd_nsavc: 1
dyn_nprint: 1
nprint: 1
seed: 123
spacing: 5.0
# Slightly looser initial sphere than default R=18*(N/60)^(1/3) (see packmol_reference_r).
packmol_tolerance: 1.2
packmol_reference_r: 20.0
packmol_reference_n: 60
temperature: 300.0
# Very low KE before NVE (ML USER-only, no SHAKE); 1 K still blew up DCM:5 in smoke tests.
nve_boltzmann_temp: 0.2

save_forces_npz: true
forces_npz_interval: 500
# Overlap guard: one chunk for the full NVE leg (0.2 ps @ 0.25 fs → 800 steps).
dynamics_overlap_check_interval: 800

mm_switch_on: 5.5
mm_switch_width: 1.5
ml_switch_width: 0.1
# MLpot mini + bonded-MM recovery if ANGL/GRMS spike after mini.
mini_nstep: 2000
bonded_mm_mini: true
bonded_mm_mini_after: mini
bonded_mm_mini_steps: 100
charmm_sd_steps: 300
charmm_abnr_steps: 400
dynamics_overlap_action: rescue
dynamics_overlap_min_distance: 0.5
# ML USER-only NVE (no SHAKE): CHARMM echeck stops early (|ΔE| spikes → ~1k steps, not 80k).
# Disable in-run echeck; post-run validation in run_job.py still requires ~90% of frames.
no_echeck: true
ml_gpu_count: 1

# Post-run COM QC (analyze_monomer_com_dcd.py): records metrics even when unstable.
com_analysis:
  no_fail: true
  outlier_factor: 2.0
  max_cluster_disp_A: 50.0
  max_internal_rmsd_A: 15.0
