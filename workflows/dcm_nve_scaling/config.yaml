# DCM:N free-space PyCHARMM MLpot NVE scaling (N = 5..10).
# Checkpoint: export MMML_CKPT before snakemake.
#
# ML dimer slots: --free-space uses all C(N,2) unique pairs (no sparse truncation).
# Do not set MMML_MLPOT_MAX_ACTIVE_DIMERS below C(N,2) for these runs; the post-mini
# audit validates with the same free-space all-pairs policy.

cluster_sizes: [5, 6, 7, 8, 9, 10]
composition_prefix: DCM
atoms_per_monomer: 5
checkpoint: "${MMML_CKPT}"
output_root: results
mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh

# Dynamics (free_nve: mini + nve)
ps_nve: 2.0
dt_fs: 0.25
# Once per integration step (print + DCD + forces)
dcd_nsavc: 1
dyn_nprint: 1
nprint: 1
seed: 123
spacing: 5.0
# Slightly looser initial sphere than default R=18*(N/60)^(1/3) (see packmol_reference_r).
packmol_tolerance: 1.2
packmol_reference_r: 20.0
packmol_reference_n: 60
temperature: 300.0
# Gentle velocity draw before NVE (ML USER-only, no SHAKE).
nve_boltzmann_temp: 30.0

save_forces_npz: true
forces_npz_interval: 500
# Overlap guard: one chunk for the full NVE leg (2 ps @ 0.25 fs → 8_000 steps).
# Avoids scratch .overlap_a/.b.res handoffs that fail when dynamics blows up mid-run.
# (ps_nve / (dt_fs * 1e-3) = 8_000)
dynamics_overlap_check_interval: 8000

mm_switch_on: 5.5
mm_switch_width: 1.5
ml_switch_width: 0.1
# MLpot mini before NVE (increase if early NVE energy spikes persist).
mini_nstep: 1000
charmm_sd_steps: 200
charmm_abnr_steps: 200
dynamics_overlap_action: rescue
dynamics_overlap_min_distance: 0.5
# ML USER-only NVE (no SHAKE): CHARMM echeck stops early (|ΔE| spikes → ~1k steps, not 80k).
# Disable in-run echeck; post-run validation in run_job.py still requires ~90% of frames.
no_echeck: true
ml_gpu_count: 1
