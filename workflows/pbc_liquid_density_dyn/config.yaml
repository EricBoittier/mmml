# PBC clusters at liquid bulk density → persistent PyCHARMM dynamics (no JAX-MD bursts).
#
# Sibling: workflows/pbc_solvent_burst/ (heat + JAX-MD alternation).
# This workflow targets equilibration + production MD at ρ ≈ bulk liquid using:
#   liquid_prep + density_prep_ladder, cleanup ladder, mmml-charmm-mpirun, warmup-mlpot-jax
#
# Matrix: solvents × bulk_density_fractions × temperatures × box_sizes
# Output: artifacts/pbc_liquid_density_dyn/{solvent}_{n}_t{T}_l{L}/

solvents: [DCM, ACO]
bulk_density_fractions: [0.9, 1.0]
bulk_density_n_min: 10
temperatures: [300.0]
box_sizes: [28.0, 32.0]
checkpoint: ${MMML_CKPT}
output_root: artifacts/pbc_liquid_density_dyn
seed_base: 4242

# Dynamics extent (per cell, all PyCHARMM)
ps_heat: 10.0
n_heat_segments: 5
heat_firstt: 50.0
heat_thermostat: hoover
pycharmm_equi_ps: 20.0
pycharmm_equi_legs: 5
pycharmm_prod_ps: 50.0
pycharmm_prod_legs: 10
prod_ensemble: pbc_npt

dt_fs: 0.25
pressure: 1.0
spacing: 4.0
packmol_tolerance: 1.5

# Resilient liquid-density prep (maps to mmml liquid-prep-dense preset knobs)
liquid_prep: true
density_prep_ladder: true
density_prep_ladder_max_rounds: 5
density_prep_lattice_abnr_steps: 200
mini_lattice_abnr_steps: 200
mc_density_equalize: true
mc_density_steps: 80
min_intermonomer_atom_distance: 1.0
max_grms_before_dyn: 50.0

cleanup_strategy:
  name: pbc_liquid_density_default
  charmm_mm:
    pretreat_on_pycharmm: true
    ps_heat: 2.0
    ps_equi: 2.0
    ps_prod: 1.0
    overlap_rescue_sd_steps: 400
    overlap_rescue_abnr_steps: 800
  mlpot:
    cleanup: true
    no_echeck_heat: true
    dynamics_overlap_action: rescue
    dynamics_overlap_min_distance: 1.5
    dynamics_intra_min_distance: 0.5
    dynamics_overlap_check_interval: 250
    dynamics_overlap_memory_handoff: true
    bonded_mm_mini: true
    bonded_mm_mini_after: mini,heat,equi
    bonded_mm_mini_steps: 1000
    charmm_pre_minimize: true
    charmm_sd_steps: 1000
    charmm_abnr_steps: 1000
    mini_nstep: 500
    dcd_nsavc: 100
    dyn_nprint: 100
    save_run_state: true
    overlap_run_state_every_chunks: 4
  jaxmd_pbc: {}

mm_switch_on: 8.0
mm_switch_width: 5.0
ml_switch_width: 1.5
ml_gpu_count: 1
ml_batch_size: 2048

# Serial JAX warmup before mpirun md-system (populates compile cache).
warmup_mlpot_jax: true
warmup_do_mm: true

mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh
MMML_MPI_NP: 1

slurm_small_cluster_max_n: 30
slurm_max_concurrent_fast: 10
slurm_max_concurrent_slow: 8
slurm_partition: gpu
slurm_nodes: 1
slurm_ntasks: 1
slurm_cpus_per_task: 4
slurm_mem_mb_per_cpu: 4000
slurm_runtime_min: 4320
slurm_gpu_nodes_fast:
  - gpu08
  - gpu09
  - gpu10
  - gpu11
slurm_gpu_nodes_slow:
  - gpu01
  - gpu02
  - gpu03

optional_bulk_fractions: [1.0]
