# CPU profiling smoke: DCM:32 L=25, MLpot + JAX compile timers enabled.
# Usage:
#   MMML_WORKFLOW_CONFIG=config.profile.cpu.yaml bash scripts/job_shell.sh dcm_32_t300_l25

cluster: pc-bach
scheduler: cpu
mlpot_device: cpu

solvents: [DCM]
cluster_sizes: [32]
temperatures: [300.0]
box_sizes: [25.0]
checkpoint: ${MMML_CKPT}
output_root: artifacts/pbc_liquid_density_dyn_profile
seed_base: 5150

mlpot_profile: true
jax_compile_timers: true

ps_heat: 0.5
n_heat_segments: 1
heat_firstt: 50.0
heat_thermostat: hoover
pycharmm_equi_ps: 0.5
pycharmm_equi_legs: 1
pycharmm_prod_ps: 0.0
pycharmm_prod_legs: 0
prod_ensemble: pbc_npt

dt_fs: 0.25
pressure: 1.0
spacing: 4.0
packmol_tolerance: 1.5

liquid_prep: true
density_prep_ladder: false
mc_density_equalize: false
min_intermonomer_atom_distance: 1.0
max_grms_before_dyn: 80.0

cleanup_strategy:
  name: pbc_liquid_density_profile
  charmm_mm:
    pretreat_on_pycharmm: false
    ps_heat: 0.0
    ps_equi: 0.0
    ps_prod: 0.0
  mlpot:
    cleanup: true
    no_echeck_heat: true
    no_echeck: true
    dynamics_overlap_action: rescue
    dynamics_overlap_min_distance: 1.5
    dynamics_intra_min_distance: 0.5
    bonded_mm_mini: true
    bonded_mm_mini_after: mini
    bonded_mm_mini_steps: 100
    charmm_pre_minimize: true
    charmm_sd_steps: 100
    charmm_abnr_steps: 100
    mini_nstep: 50
    dcd_nsavc: 25
    dyn_nprint: 25
    save_run_state: true
  jaxmd_pbc: {}

mm_switch_on: 8.0
mm_switch_width: 5.0
ml_switch_width: 1.5
ml_gpu_count: 1
ml_batch_size: 128

warmup_mlpot_jax: true
warmup_do_mm: false
use_mpirun_wrapper: true

mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh
MMML_MPI_NP: 1
