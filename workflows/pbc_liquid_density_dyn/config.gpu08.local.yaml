# Local dual-RTX-5090 (gpu08) — dense liquid-density matrix.
#
# Targets larger boxes and 100% bulk where NPR tier allows. DCM L=40 @ 100%
# (N=602) exceeds xxxlarge tier and is marked optional/skipped by monitor.
#
# Launch (both GPUs):
#   nohup bash scripts/snakemake_local.sh >> snakemake_gpu08.log 2>&1 &
#
# Or production matrix on-node while Slurm runs elsewhere:
#   MMML_WORKFLOW_CONFIG=config.yaml bash scripts/snakemake_local.sh

solvents: [DCM, ACO]
bulk_density_fractions: [0.9, 1.0]
bulk_density_n_min: 10
temperatures: [300.0]
box_sizes: [32.0, 36.0, 40.0]
checkpoint: ${MMML_CKPT}
output_root: artifacts/pbc_liquid_density_gpu08
seed_base: 7272

# 5090 (32 GB): larger ML batches than cluster default.
ml_batch_size: 4096
ml_gpu_count: 1

local_gpu_count: 2
local_max_concurrent: 2

ps_heat: 10.0
n_heat_segments: 5
heat_firstt: 50.0
heat_thermostat: hoover
pycharmm_equi_ps: 20.0
pycharmm_equi_legs: 5
pycharmm_prod_ps: 50.0
pycharmm_prod_legs: 10
prod_ensemble: pbc_npt

dt_fs: 0.25
pressure: 1.0
spacing: 4.0
packmol_tolerance: 1.5

liquid_prep: true
density_prep_ladder: true
density_prep_ladder_max_rounds: 5
density_prep_lattice_abnr_steps: 200
mini_lattice_abnr_steps: 200
mc_density_equalize: true
mc_density_steps: 80
min_intermonomer_atom_distance: 1.0
max_grms_before_dyn: 50.0

cleanup_strategy:
  name: pbc_liquid_density_gpu08
  charmm_mm:
    pretreat_on_pycharmm: true
    ps_heat: 2.0
    ps_equi: 2.0
    ps_prod: 1.0
    overlap_rescue_sd_steps: 400
    overlap_rescue_abnr_steps: 800
  mlpot:
    cleanup: true
    no_echeck_heat: true
    dynamics_overlap_action: rescue
    dynamics_overlap_min_distance: 1.5
    dynamics_intra_min_distance: 0.5
    dynamics_overlap_check_interval: 250
    dynamics_overlap_memory_handoff: true
    bonded_mm_mini: true
    bonded_mm_mini_after: mini,heat,equi
    bonded_mm_mini_steps: 1000
    charmm_pre_minimize: true
    charmm_sd_steps: 1000
    charmm_abnr_steps: 1000
    mini_nstep: 500
    dcd_nsavc: 100
    dyn_nprint: 100
    save_run_state: true
    overlap_run_state_every_chunks: 4
  jaxmd_pbc: {}

mm_switch_on: 8.0
mm_switch_width: 5.0
ml_switch_width: 1.5

warmup_mlpot_jax: true
warmup_do_mm: false

mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh
MMML_MPI_NP: 1

# Local executor: single fast GPU pool (no slow-tier split).
slurm_gpu_nodes_slow: []
slurm_max_concurrent_fast: 2
slurm_gpu_nodes_fast:
  - gpu08

optional_bulk_fractions: [1.0]
optional_sizes: [602]
