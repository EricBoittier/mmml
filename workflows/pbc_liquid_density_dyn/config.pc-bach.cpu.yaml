# pc-bach CPU cluster (partition ``long``, nodes node01–node20).
#
# Step 1 (validate tier libs; skip rebuild when OK):
#   bash scripts/check_pc_bach_step1.sh
#
# Step 3 job prolog (also applied automatically by job_shell.sh / snakemake_slurm_cpu.sh):
#   source ../../scripts/pc_bach_env.sh
#   export CHARMM_LIB_DIR=$HOME/.cache/mmml-charmm-build/tier_8000000_nodomdec/lib  # per-job via ensure_charmm_mlpot_limits
#   MMML_MPI_NP=1 ../../scripts/mmml-charmm-mpirun.sh md-system ...
#
# Launch:
#   cd workflows/pbc_liquid_density_dyn
#   bash scripts/preflight.sh --config config.pc-bach.cpu.yaml
#   bash scripts/snakemake_slurm_cpu.sh
#
# Single cell:
#   MMML_WORKFLOW_CONFIG=config.pc-bach.cpu.yaml \
#     srun --partition=long --cpus-per-task=8 --mem=32G \
#     bash scripts/job_shell.sh dcm_10_t300_l28

cluster: pc-bach
scheduler: cpu
mlpot_device: cpu

solvents: [DCM, ACO]
bulk_density_fractions: [0.5, 0.9]
bulk_density_n_min: 10
temperatures: [300.0]
box_sizes: [28.0, 32.0]
checkpoint: ${MMML_CKPT}
output_root: artifacts/pbc_liquid_density_dyn_pc_bach
seed_base: 4242

ps_heat: 10.0
n_heat_segments: 5
heat_firstt: 50.0
heat_thermostat: hoover
pycharmm_equi_ps: 20.0
pycharmm_equi_legs: 3
pycharmm_prod_ps: 30.0
pycharmm_prod_legs: 5
prod_ensemble: pbc_npt

dt_fs: 0.25
pressure: 1.0
spacing: 4.0
packmol_tolerance: 1.5

liquid_prep: true
density_prep_ladder: true
density_prep_ladder_max_rounds: 5
density_prep_lattice_abnr_steps: 200
mini_lattice_abnr_steps: 200
mc_density_equalize: true
mc_density_steps: 80
min_intermonomer_atom_distance: 1.0
max_grms_before_dyn: 50.0

cleanup_strategy:
  name: pbc_liquid_density_pc_bach
  charmm_mm:
    pretreat_on_pycharmm: true
    ps_heat: 2.0
    ps_equi: 2.0
    ps_prod: 1.0
    overlap_rescue_sd_steps: 400
    overlap_rescue_abnr_steps: 800
  mlpot:
    cleanup: true
    no_echeck_heat: true
    dynamics_overlap_action: rescue
    dynamics_overlap_min_distance: 1.5
    dynamics_intra_min_distance: 0.5
    dynamics_overlap_check_interval: 250
    dynamics_overlap_memory_handoff: true
    bonded_mm_mini: true
    bonded_mm_mini_after: mini,heat,equi
    bonded_mm_mini_steps: 1000
    charmm_pre_minimize: true
    charmm_sd_steps: 1000
    charmm_abnr_steps: 1000
    mini_nstep: 500
    dcd_nsavc: 100
    dyn_nprint: 100
    save_run_state: true
    overlap_run_state_every_chunks: 4
  jaxmd_pbc: {}

mm_switch_on: 8.0
mm_switch_width: 5.0
ml_switch_width: 1.5
ml_gpu_count: 1
ml_batch_size: 512
warmup_ml_batch_size: 128
jax_compile_threads: 1
warmup_compile_threads: 1

warmup_mlpot_jax: true
warmup_do_mm: true
use_mpirun_wrapper: true

mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh
MMML_MPI_NP: 1

slurm_partition: long
slurm_max_concurrent: 2
slurm_nodes: 1
slurm_ntasks: 1
slurm_cpus_per_task: 16
slurm_mem_mb_per_cpu: 8000
slurm_runtime_min: 4320
# Avoid node09 (long-running foreign job + MPI sweep); Snakemake jobs need RAM for JAX compile.
slurm_exclude_nodes: [node09]
# slurm_mail_user: you@example.com   # optional; omit = no Slurm mail
# Omit nodelist to let Slurm pick idle nodes on ``long``.
# slurm_cpu_nodes: []

optional_bulk_fractions: [0.9]
