# GPU MLpot scaling profile: DCM at ~90% bulk liquid density across box sizes.
# Short dynamics + --mlpot-profile to measure ML vs CHARMM wall time per N.
# 90% bulk keeps all cells within the xxxlarge CHARMM NPR tier (max N_ML≈2710).
#
# Matrix: DCM × bulk 90% × L ∈ {28, 32, 36, 40}  → 4 cells
#   N = 186, 277, 395, 542 monomers
#
# Launch:
#   MMML_WORKFLOW_CONFIG=config.profile.gpu.yaml \
#     bash scripts/preflight.sh
#   MMML_WORKFLOW_CONFIG=config.profile.gpu.yaml \
#     nohup bash scripts/snakemake_slurm.sh 2 > snakemake_profile.log 2>&1 &
#
# Collect:
#   MMML_WORKFLOW_CONFIG=config.profile.gpu.yaml \
#     python scripts/collect_mlpot_profile.py

solvents: [DCM]
bulk_density_fractions: [0.9]
bulk_density_n_min: 10
temperatures: [300.0]
box_sizes: [28.0, 32.0, 36.0, 40.0]
checkpoint: ${MMML_CKPT}
output_root: artifacts/pbc_liquid_density_profile
seed_base: 6262

# Enough MD for meaningful MLpot callback samples; keep total wall time modest.
ps_heat: 2.0
n_heat_segments: 2
heat_firstt: 50.0
heat_thermostat: hoover
pycharmm_equi_ps: 3.0
pycharmm_equi_legs: 1
pycharmm_prod_ps: 10.0
pycharmm_prod_legs: 1
prod_ensemble: pbc_npt

dt_fs: 0.25
pressure: 1.0
spacing: 4.0
packmol_tolerance: 1.5
dcd_nsavc: 50
dyn_nprint: 50

liquid_prep: true
density_prep_ladder: true
density_prep_ladder_max_rounds: 3
density_prep_lattice_abnr_steps: 100
mini_lattice_abnr_steps: 100
mc_density_equalize: true
mc_density_steps: 40
min_intermonomer_atom_distance: 1.0
max_grms_before_dyn: 50.0

mlpot_profile: true

cleanup_strategy:
  name: pbc_liquid_density_profile
  charmm_mm:
    pretreat_on_pycharmm: true
    ps_heat: 1.0
    ps_equi: 1.0
    ps_prod: 0.5
    overlap_rescue_sd_steps: 200
    overlap_rescue_abnr_steps: 400
  mlpot:
    cleanup: true
    no_echeck_heat: true
    no_echeck: true
    dynamics_overlap_action: rescue
    dynamics_overlap_min_distance: 1.5
    dynamics_intra_min_distance: 0.5
    dynamics_overlap_check_interval: 250
    dynamics_overlap_memory_handoff: true
    bonded_mm_mini: true
    bonded_mm_mini_after: mini,heat,equi
    bonded_mm_mini_steps: 500
    charmm_pre_minimize: true
    charmm_sd_steps: 500
    charmm_abnr_steps: 500
    mini_nstep: 300
    dcd_nsavc: 50
    dyn_nprint: 50
    save_run_state: true
  jaxmd_pbc: {}

mm_switch_on: 8.0
mm_switch_width: 5.0
ml_switch_width: 1.5
ml_gpu_count: 1
ml_batch_size: 2048

warmup_mlpot_jax: true
warmup_do_mm: false

mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh
MMML_MPI_NP: 1

slurm_partition: gpu
slurm_nodes: 1
slurm_ntasks: 1
slurm_cpus_per_task: 4
slurm_mem_mb_per_cpu: 4000
slurm_runtime_min: 1440
slurm_max_concurrent_fast: 4
slurm_gpu_nodes_fast:
  - gpu08
  - gpu09
  - gpu10
  - gpu11
