# Snakemake >=8.6: requires snakemake-executor-plugin-slurm (see README).
# Install: uv run --with snakemake --with snakemake-executor-plugin-slurm ...
executor: slurm
jobs: 4
latency-wait: 120
retries: 1
default-resources:
  - gpu=1
  - mpi=1
  - runtime=2880
  - nodes=1
  - slurm_partition=gpu
  - mem_mb_per_cpu=3000
  - cpus_per_task=4
  - tasks=4
  - gres=gpu:1
