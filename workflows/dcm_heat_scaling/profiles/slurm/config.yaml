# Snakemake >=8.6: requires snakemake-executor-plugin-slurm (see README).
# Install: uv run --with snakemake --with snakemake-executor-plugin-slurm ...
executor: slurm
jobs: 4
latency-wait: 120
retries: 1
# Only list vars that must be set before launch. MMML_PYTHON/MMML_BIN are
# resolved from .venv by scripts/resolve_mmml_env.sh when unset.
envvars:
  - MMML_CKPT
default-resources:
  - gpu=1
  - mpi=1
  - runtime=2880
  - nodes=1
  - slurm_partition=gpu
  - mem_mb_per_cpu=3000
  - cpus_per_task=4
  - tasks=1
