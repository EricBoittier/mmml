# DCM:3 PyCHARMM MLpot NVE sweep: cutoff presets × initial COM geometries.
# Goal: rank ML/MM switch widths by NVE energy smoothness (low drift / low step noise).
#
# Prerequisites: export MMML_CKPT before snakemake (see README).

composition: DCM:3
checkpoint: "${MMML_CKPT}"
output_root: results
mpirun_wrapper: ../../scripts/mmml-charmm-mpirun.sh

# Short NVE leg for screening; increase once a preset looks stable.
ps_nve: 1.0
dt_fs: 0.25
temperature: 300.0
nve_boltzmann_temp: 0.2
seed: 123
spacing: 5.0
packmol_reference_r: 18.0
packmol_reference_n: 60
packmol_tolerance: 1.2

# DYNA> / DCD every integration step (required for energy-drift analysis)
dcd_nsavc: 1
dyn_nprint: 1
nprint: 1
dyn_inbfrq: -1
pre_nve_charmm_update: true

mini_nstep: 500
bonded_mm_mini: true
bonded_mm_mini_after: mini
bonded_mm_mini_steps: 100
charmm_sd_steps: 50
charmm_abnr_steps: 100
dynamics_overlap_action: rescue
dynamics_overlap_min_distance: 0.4
# One overlap chunk for the full NVE leg (1 ps @ 0.25 fs → 4000 steps).
# interval=1 + dcd_nsavc=1 forces 2-step chunks and NVE stops after ~2 steps.
dynamics_overlap_check_interval: 4000
no_echeck: true
ml_gpu_count: 1

# Round-3: ML taper width sensitivity at fixed dcm9 mm_on/mm_w (7 / 5 Å).
# Round-2 extended_mm5 / handoff_7p5 paused until ML width is settled.
cutoff_presets:
  # Production baseline; ML taper [6.9, 7.0] Å.
  dcm9_stability:
    mm_switch_on: 7.0
    mm_switch_width: 5.0
    ml_switch_width: 0.1
  # Sharper ML→MM handoff: [6.99, 7.0] Å.
  dcm9_ml01:
    mm_switch_on: 7.0
    mm_switch_width: 5.0
    ml_switch_width: 0.01
  # Near-step handoff: [6.999, 7.0] Å.
  dcm9_ml001:
    mm_switch_on: 7.0
    mm_switch_width: 5.0
    ml_switch_width: 0.001
  # Wide ML taper contrast (round-1 best close/mid, unstable far/asymmetric).
  extended_handoff:
    mm_switch_on: 8.0
    mm_switch_width: 3.0
    ml_switch_width: 1.5

# Rigid trimer COM placement (monomer 0 fixed; 1 along +x; 2 at angle from +x)
geometry_variants:
  close:
    d01: 4.0
    d02: 4.5
    angle_02_deg: 60.0
  mid:
    d01: 6.0
    d02: 7.0
    angle_02_deg: 60.0
  far:
    d01: 8.0
    d02: 9.0
    angle_02_deg: 60.0
  asymmetric:
    d01: 5.0
    d02: 9.0
    angle_02_deg: 90.0
