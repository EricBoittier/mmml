# Conda environment for MMML with GPU support (CUDA 13)
name: mmml-gpu-cuda13
channels:
  - conda-forge
  - nvidia
  - defaults
dependencies:
  - python-freethreading>=3.13,<3.15
  
  # CUDA toolkit
  - cuda-toolkit=13
  - cudnn>=9.10.1
  
  # Core scientific computing
  - numpy
  - scipy
  - pandas
  - matplotlib>=3.5
  
  # JAX ecosystem (GPU will be installed via pip for better CUDA compatibility)
  
  # Chemistry and visualization
  - ase
  - pyyaml
  
  # Utilities
  - tqdm
  - rich-cli
  - pip
  - git
  
  # Build tools for compiling extensions
  - gfortran
  - cmake
  - make
  - openblas
  - liblapack
  
  # PIP-only dependencies
  - pip:
      # JAX with CUDA 13 support (must be installed from specific index)
      - --find-links https://storage.googleapis.com/jax-releases/jax_cuda_releases.html
      - jax>=0.10.0
      - jaxlib>=0.10.0
      - jax-cuda13-plugin>=0.9.0
      - jax-cuda13-pjrt>=0.9.0
      - cupy-cuda13x>=13.0.0
      - cutensor-cu13>=2.0.0
      - e3x
      - plotnine
      - patchworklib
      # JAX ecosystem
      - dm-haiku
      - flax
      - optax
      - chex
      - jaxtyping
      - jmp
      - jraph
      - orbax-checkpoint
      - jax-md @ git+https://github.com/google/jax-md.git@a722def5f2c30bd9dceb5fcc5c2a8d19f3cba2b6
      - jax-pme @ git+https://github.com/EricBoittier/jax-pme.git@c5f82726840de0abe29e3074adfaac8c826ffb85
      
      # ML utilities
      - ml-dtypes
      - ml-collections
      - einops
      
      # Hydra configuration
      - hydra-core>=1.3.0
      - omegaconf>=2.3.0
      
      # Utilities
      - tabulate
      - typing-extensions
      - pint
      
      # Install mmml in editable mode (pip runs from setup/, so use .. for project root)
      - -e ..
